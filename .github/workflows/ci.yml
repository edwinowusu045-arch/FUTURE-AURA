name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run --workspace next-app build
      - run: npm run --workspace server build
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
